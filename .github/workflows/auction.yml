name: Auction tests
on:
  push:
   branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
   runs-on: ubuntu-latest
   timeout-minutes: 60
   steps:
     - uses: actions/checkout@v4
     - uses: actions/setup-node@v6
       with:
          node-version: lts/*
        
     - name: Run js files
       run: node app.js

    
